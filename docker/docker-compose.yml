version: '3.8'

services:
  learning-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: learning-manager
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./static/images:/app/static/images
      - ../.env:/app/.env
    environment:
      - FLASK_ENV=production
      - FLASK_PORT=5000
    networks:
      - learning-network

networks:
  learning-network:
    driver: bridge
